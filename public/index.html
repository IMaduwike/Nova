<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0c;
      --surface:  #141414;
      --border:   #222;
      --text:     #e8e8e2;
      --muted:    #444;
      --subtle:   #2a2a2a;
      --accent:   #c8f060;
      --user-fg:  #a0a090;
      --red:      #ff4d4d;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist Mono', monospace;
      font-size: 13.5px;
      line-height: 1.7;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      padding: 22px 28px 18px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .wordmark em { font-style: italic; color: var(--accent); }

    .tagline {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .live-dot {
      margin-left: auto;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    #messages {
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); }

    #welcome {
      margin: auto 0;
      padding: 20px 0 40px;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .welcome-heading {
      font-family: 'Instrument Serif', serif;
      font-size: 38px;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .welcome-heading em { font-style: italic; color: var(--accent); }

    .welcome-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.9;
    }

    .welcome-sub span {
      display: block;
      margin-top: 20px;
      font-size: 11px;
      color: var(--border);
      letter-spacing: 0.04em;
    }

    .msg-row {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 0 14px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.2s ease forwards;
      opacity: 0;
    }

    .msg-row:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-role {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: 3px;
      font-weight: 500;
    }

    .msg-row.nova .msg-role { color: var(--accent); opacity: 0.7; }

    .msg-content { font-size: 13.5px; line-height: 1.75; }
    .msg-row.user .msg-content { color: var(--user-fg); }

    .msg-content p { margin-bottom: 10px; }
    .msg-content p:last-child { margin-bottom: 0; }

    .msg-content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      border-radius: 4px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 12px 0;
      font-size: 12px;
      line-height: 1.6;
    }

    .msg-content code {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      background: var(--subtle);
      padding: 1px 6px;
      border-radius: 3px;
      color: var(--accent);
    }

    .msg-content pre code { background: none; padding: 0; color: #c8c8b8; }
    .msg-content strong { color: var(--text); font-weight: 500; }

    .thinking-row {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 0 14px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
    }

    .thinking-dots { display: flex; gap: 5px; align-items: center; height: 22px; }

    .thinking-dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent);
      animation: dot 1.4s infinite;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.1); }
    }

    .error-text { color: var(--red); font-size: 12px; }

    footer {
      border-top: 1px solid var(--border);
      padding: 18px 28px 24px;
      background: var(--bg);
    }

    #input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      min-height: 50px;
      max-height: 180px;
      outline: none;
      display: block;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }

    #input:focus { border-color: #2e2e2e; }
    #input::placeholder { color: var(--muted); }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .input-hint { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }

    #submit-btn {
      background: var(--accent);
      color: #0c0c0c;
      border: none;
      border-radius: 4px;
      padding: 7px 20px;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    #submit-btn:hover { opacity: 0.8; }
    #submit-btn:active { transform: scale(0.97); }
    #submit-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

    @media (max-width: 600px) {
      header, #messages, footer { padding-left: 18px; padding-right: 18px; }
      .welcome-heading { font-size: 28px; }
      .msg-row { grid-template-columns: 34px 1fr; }
      .thinking-row { grid-template-columns: 34px 1fr; }
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="wordmark">No<em>v</em>a</div>
    <div class="tagline">coding assistant</div>
    <div class="live-dot"></div>
  </header>

  <div id="messages">
    <div id="welcome">
      <div class="welcome-heading">Hello.<br><em>What are you<br>building?</em></div>
      <div class="welcome-sub">
        Ask me anything — code, architecture, bugs, concepts.
        <span>↓ type below</span>
      </div>
    </div>
  </div>

  <footer>
    <textarea
      id="input"
      placeholder="Ask Nova anything..."
      rows="2"
      autocomplete="off"
      spellcheck="false"
    ></textarea>
    <div class="input-footer">
      <span class="input-hint">shift + enter for new line</span>
      <button id="submit-btn" onclick="sendMessage()">Send →</button>
    </div>
  </footer>

</div>
<script>
  let conversationHistory = [];
  let currentSummary = null;
  let isThinking = false;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const submitBtn  = document.getElementById('submit-btn');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function addRow(role, html, isError = false) {
    removeWelcome();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const roleEl = document.createElement('div');
    roleEl.className = 'msg-role';
    roleEl.textContent = role === 'nova' ? 'nova' : 'you';

    const contentEl = document.createElement('div');
    contentEl.className = 'msg-content';
    contentEl.innerHTML = isError ? `<span class="error-text">${html}</span>` : html;

    row.appendChild(roleEl);
    row.appendChild(contentEl);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function addThinking() {
    removeWelcome();
    const row = document.createElement('div');
    row.className = 'thinking-row';
    row.id = 'thinking-row';
    row.innerHTML = `
      <div class="msg-role" style="color:var(--accent);opacity:0.7">nova</div>
      <div class="thinking-dots"><span></span><span></span><span></span></div>
    `;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeThinking() {
    const el = document.getElementById('thinking-row');
    if (el) el.remove();
  }

  function format(text) {
    let s = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    s = s.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trim()}</code></pre>`);
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    const parts = s.split(/(<pre>[\s\S]*?<\/pre>)/g);
    return parts.map(part => {
      if (part.startsWith('<pre>')) return part;
      return part.split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('');
    }).join('');
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isThinking) return;

    isThinking = true;
    submitBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addRow('user', format(text));
    conversationHistory.push({ role: 'user', content: text });
    addThinking();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory, summary: currentSummary })
      });

      removeThinking();

      if (!res.ok) {
        const err = await res.json();
        addRow('nova', err.error || 'Something went wrong.', true);
        conversationHistory.pop();
        return;
      }

      const data = await res.json();

      // Silent memory — no UI
      if (data.didSummarize) {
        currentSummary = data.summary;
        conversationHistory = conversationHistory.slice(-4);
      } else if (data.summary && !currentSummary) {
        currentSummary = data.summary;
      }

      conversationHistory.push({ role: 'assistant', content: data.reply });
      addRow('nova', format(data.reply));

    } catch (err) {
      removeThinking();
      addRow('nova', 'Could not reach the server.', true);
      conversationHistory.pop();
    } finally {
      isThinking = false;
      submitBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
